services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev_container
    volumes:
      # Use :cached for better performance on Mac/OrbStack
      - .:/workspaces/app:cached
    environment:
      - PYTHONUNBUFFERED=1
    # keep the container running indefinitely for Dev Container
    command: sleep infinity
    # Optional: map ports if a web server is run
    # ports:
    #   - "8000:8000"
